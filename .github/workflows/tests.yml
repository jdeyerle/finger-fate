name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode 26
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -n1)"

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project "Finger Fate.xcodeproj" \
            -scheme "Finger Fate" \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            -skip-testing:"Finger FateUITests" \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
